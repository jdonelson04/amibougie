// ============================================================
// CATEGORY RULES
// ============================================================
const MANDATORY_CATS = [
  "Food & Drink", "Fashion & Style", "Golf-Adjacent", "Home & Living",
  "Travel", "Social & Entertainment", "Self-Care & Grooming",
  "Fitness & Wellness", "Tech & Cars", "Pets", "Sports & Hobbies",
  "Money & Attitudes", "General Lifestyle"
];
const HIGH_SIGNAL_CATS = [
  "Food & Drink", "Fashion & Style", "Home & Living", "Travel",
  "Social & Entertainment", "Self-Care & Grooming", "Money & Attitudes"
];
const DEPRIORITIZED = "Golf (Specific)";

// ============================================================
// QUESTION SELECTION
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectQuestions() {
  const selected = [];
  const usedIds = new Set();

  // Group questions by category
  const byCat = {};
  QUESTIONS.forEach(q => {
    if (!byCat[q.cat]) byCat[q.cat] = [];
    byCat[q.cat].push(q);
  });

  // 1. One from each mandatory category
  for (const cat of MANDATORY_CATS) {
    if (byCat[cat] && byCat[cat].length > 0) {
      const pool = shuffle(byCat[cat]);
      const pick = pool[0];
      selected.push(pick);
      usedIds.add(pick.id);
    }
  }

  // 2. At most 1 from Golf (Specific) — 50/50 whether we include one
  if (Math.random() > 0.5 && byCat[DEPRIORITIZED]) {
    const pool = shuffle(byCat[DEPRIORITIZED]);
    const pick = pool[0];
    selected.push(pick);
    usedIds.add(pick.id);
  }

  // 3. Fill remaining slots from high-signal categories
  const remaining = 20 - selected.length;
  const highSignalPool = shuffle(
    QUESTIONS.filter(q =>
      HIGH_SIGNAL_CATS.includes(q.cat) && !usedIds.has(q.id)
    )
  );

  for (let i = 0; i < remaining && i < highSignalPool.length; i++) {
    selected.push(highSignalPool[i]);
    usedIds.add(highSignalPool[i].id);
  }

  // 4. Balance question types — try to get roughly even mix
  // (already handled by random selection across categories)

  return shuffle(selected);
}

// ============================================================
// QUIZ STATE
// ============================================================
let questions = [];
let currentIdx = 0;
let answers = [];

function startQuiz() {
  questions = selectQuestions();
  currentIdx = 0;
  answers = [];

  document.getElementById('intro').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('counter').style.display = 'block';
  document.getElementById('questionArea').style.display = 'block';

  showQuestion();
}

function showQuestion() {
  const q = questions[currentIdx];
  const area = document.getElementById('questionArea');

  // Update progress
  const pct = (currentIdx / 20) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('counter').textContent = (currentIdx + 1) + ' of 20';

  let html = '<div class="fade-in">';
  html += '<div class="question-text">' + escHtml(q.text) + '</div>';

  if (q.type === 'YN') {
    html += '<div class="yn-row">';
    html += '<button class="yn-btn" onclick="answer(\'Yes\')">Yes</button>';
    html += '<button class="yn-btn" onclick="answer(\'No\')">No</button>';
    html += '</div>';
  } else if (q.type === 'MC') {
    html += '<div class="answers">';
    const letters = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, i) => {
      html += '<button class="answer-btn" onclick="answer(\'' + letters[i] + '\')">'
        + letters[i] + ') ' + escHtml(opt) + '</button>';
    });
    html += '</div>';
  } else if (q.type === 'SCALE') {
    html += '<div class="scale-row">';
    for (let n = 1; n <= 5; n++) {
      html += '<button class="scale-btn" onclick="answer(\'' + n + '\')">' + n + '</button>';
    }
    html += '</div>';
    html += '<div class="scale-labels">';
    html += '<div class="scale-label">1 = ' + escHtml(q.low) + '</div>';
    html += '<div class="scale-label right">5 = ' + escHtml(q.high) + '</div>';
    html += '</div>';
  }

  html += '</div>';
  area.innerHTML = html;
}

function answer(value) {
  const q = questions[currentIdx];
  let displayAnswer = value;

  if (q.type === 'MC') {
    const letters = ['A', 'B', 'C', 'D'];
    const idx = letters.indexOf(value);
    if (idx >= 0 && q.options[idx]) {
      displayAnswer = value + ') ' + q.options[idx];
    }
  }

  answers.push({
    question: q.text,
    category: q.cat,
    type: q.type,
    answer: displayAnswer
  });

  currentIdx++;

  if (currentIdx >= 20) {
    finishQuiz();
  } else {
    showQuestion();
  }
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// SCORING VIA CLAUDE API
// ============================================================
async function finishQuiz() {
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('counter').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  // Fill progress bar to 100%
  document.getElementById('progressBar').style.width = '100%';

  const qaText = answers.map((a, i) =>
    (i + 1) + '. [' + a.category + '] ' + a.question + '\n   Answer: ' + a.answer
  ).join('\n\n');

  const systemPrompt = `You are the AmIBougie scoring engine. You've just received the answers from a 20-question interview about someone's lifestyle preferences, habits, and opinions. Your job is to score how bougie they are on a scale of 0 to 100.

SCORING APPROACH (hybrid — informed judgment, not pure math):

For each answer, note where it falls on a bougie spectrum. Bougie-ness is NOT about always picking the most expensive option. It's about having strong opinions, specific preferences, and a personal threshold below which someone would rather opt out entirely. "I'd rather skip it than settle" is a stronger bougie signal than "I always pick the priciest one."

After reviewing all 20 answers, assess these meta-signals:
- Breadth: Bougie across many categories, or just one area? Breadth increases score significantly.
- Intensity: Strong opinions? "I'd never" and "I always" are the strongest signals.
- Consistency: Do their answers tell a coherent story of an elevated lifestyle?
- "Never/Always" signals: Absolute statements reveal identity, not just behavior.

SCORING RANGES:
0–15: Almost no bougie signals. Aggressively low-maintenance.
16–30: A few preferences, but mostly practical and unfussy.
31–45: Some bougie tendencies in one or two categories. Would push back on being called bougie.
46–60: Solidly bougie in a few areas. Has preferences, knows what they like, willing to spend.
61–75: Bougie across the board. Strong opinions, consistent brand awareness.
76–90: Very bougie. Curated lifestyle, committed to it.
91–100: Peak bougie. Opinions about everything, never met a premium option they didn't prefer.

TIERS:
0–15: "The Everyman" — You might actually be allergic to luxury.
16–30: "The Pragmatist" — You appreciate nice things in theory but your wallet runs the show.
31–45: "Bougie-Curious" — You've got a few tells, but you can still walk into a Kohl's without flinching.
46–60: "Casual Connoisseur" — You know what you like, you're willing to pay for it, and you've got opinions. Welcome to the club.
61–75: "Certified Suburbanite" — Your Target runs somehow always include the home decor aisle, and your golf bag costs more than your first car.
76–90: "Premium Select" — You are living an elevated life and you've stopped pretending otherwise.
91–100: "Unapologetically Bougie" — You are the person this quiz was designed to find. Your friends already know.

Respond with ONLY valid JSON in this exact format, no other text:
{"score": <number>, "tier": "<tier name>", "tagline": "<tier tagline>", "roast": "<2-4 sentence personalized roast referencing their specific answers. Be funny but kind. The goal is for them to laugh and say 'okay, fair.' The roast should feel like it could only be written about this specific person.>"}`;

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1024,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: 'Here are the interview answers:\n\n' + qaText
        }]
      })
    });

    if (!response.ok) {
      const errBody = await response.text();
      throw new Error('API error (' + response.status + '): ' + errBody);
    }

    const data = await response.json();
    const text = data.content[0].text;

    // Parse JSON from response
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse scoring response');

    const result = JSON.parse(jsonMatch[0]);
    showResults(result);

  } catch (err) {
    const errorEl = document.getElementById('error');
    errorEl.textContent = 'Something went wrong: ' + err.message;
    errorEl.style.display = 'block';
  }
}

// ============================================================
// RESULTS
// ============================================================
function showResults(result) {
  document.getElementById('loading').style.display = 'none';

  const resultsEl = document.getElementById('results');
  document.getElementById('tierName').textContent = result.tier;
  document.getElementById('scoreNum').textContent = result.score;
  document.getElementById('tierTagline').textContent = result.tagline;
  document.getElementById('roast').textContent = result.roast;

  // Build answers review list
  const reviewEl = document.getElementById('answersReview');
  let html = '<h3>Your Answers</h3>';
  answers.forEach((a, i) => {
    html += '<div class="answer-item">';
    html += '<div class="aq">' + (i + 1) + '. ' + escHtml(a.question) + '</div>';
    html += '<div class="aa">' + escHtml(a.answer) + '</div>';
    html += '</div>';
  });
  reviewEl.innerHTML = html;

  resultsEl.style.display = 'block';
  resultsEl.classList.add('fade-in');
}

function toggleAnswers() {
  const reviewEl = document.getElementById('answersReview');
  const btn = document.querySelector('.answers-btn');
  if (reviewEl.style.display === 'block') {
    reviewEl.style.display = 'none';
    btn.textContent = 'See My Answers';
  } else {
    reviewEl.style.display = 'block';
    btn.textContent = 'Hide My Answers';
  }
}

function retake() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').classList.remove('fade-in');
  document.getElementById('answersReview').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('intro').style.display = 'block';
  // Reset answers button text
  const btn = document.querySelector('.answers-btn');
  if (btn) btn.textContent = 'See My Answers';
}
